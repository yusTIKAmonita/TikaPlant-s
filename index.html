<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikaPlant's Dashboard</title>
    <!-- Library pendukung agar React jalan langsung di browser -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .lucide { vertical-align: middle; display: inline-block; }
        /* Animasi transisi halus */
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-700">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        // Komponen Ikon Sederhana
        const Icon = ({ name, size = 16, className = "" }) => (
            <i className={`lucide-${name} ${className}`} style={{ fontSize: size, width: size, height: size }}></i>
        );

        const App = () => {
            // Data Master: 18 Tanaman Lengkap
            const [plants, setPlants] = useState([
                { id: 'STE-001', nama: 'Snapdragon Tetra', varietas: 'Floral', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
                { id: 'DPE-001', nama: 'Dwarf Petunia', varietas: 'Miniature', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
                { id: 'ACR-001', nama: 'Aster Crego', varietas: 'Perennial', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
                { id: 'KAN-001', nama: 'Kangkung', varietas: 'Darat', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
                { id: 'THI-001', nama: 'Terong Hijau', varietas: 'Lalap', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
                { id: 'TUN-001', nama: 'Terong Ungu', varietas: 'Panjang', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
                { id: 'CAB-001', nama: 'Cabai', varietas: 'Rawit', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
                { id: 'STR-001', nama: 'Stroberi', varietas: 'Manis', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
                { id: 'BAY-001', nama: 'Bayam', varietas: 'Cabut', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
                { id: 'CIP-001', nama: 'Ciplukan', varietas: 'Liar', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
                { id: 'LBU-001', nama: 'Lidah Buaya', varietas: 'Aloe Vera', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
                { id: 'ANG-001', nama: 'Anggrek', varietas: 'Pot 1', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
                { id: 'ANG-002', nama: 'Anggrek', varietas: 'Pot 2', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
                { id: 'ANG-003', nama: 'Anggrek', varietas: 'Pot 3', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
                { id: 'LME-001', nama: 'Lidah Mertua', varietas: 'Pot 1', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
                { id: 'LME-002', nama: 'Lidah Mertua', varietas: 'Pot 2', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
                { id: 'LME-003', nama: 'Lidah Mertua', varietas: 'Pot 3', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
                { id: 'SER-001', nama: 'Sereh', varietas: 'Dapur', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' }
            ]);

            // Data Log Harian: Mengembalikan 8 data semai awal
            const [logs, setLogs] = useState([
                { id: 101, plantId: 'STE-001', tanggal: '2026-03-30', tinggi: 0, daun: 0, fase: 'Semai', kondisi: 'Sehat', foto: '' },
                { id: 102, plantId: 'DPE-001', tanggal: '2026-03-30', tinggi: 0, daun: 0, fase: 'Semai', kondisi: 'Sehat', foto: '' },
                { id: 103, plantId: 'ACR-001', tanggal: '2026-03-30', tinggi: 0, daun: 0, fase: 'Semai', kondisi: 'Sehat', foto: '' },
                { id: 104, plantId: 'KAN-001', tanggal: '2026-03-30', tinggi: 0, daun: 0, fase: 'Semai', kondisi: 'Sehat', foto: '' },
                { id: 105, plantId: 'THI-001', tanggal: '2026-03-30', tinggi: 0, daun: 0, fase: 'Semai', kondisi: 'Sehat', foto: '' },
                { id: 106, plantId: 'TUN-001', tanggal: '2026-03-30', tinggi: 0, daun: 0, fase: 'Semai', kondisi: 'Sehat', foto: '' },
                { id: 107, plantId: 'CAB-001', tanggal: '2026-03-30', tinggi: 0, daun: 0, fase: 'Semai', kondisi: 'Sehat', foto: '' },
                { id: 108, plantId: 'STR-001', tanggal: '2026-03-30', tinggi: 0, daun: 0, fase: 'Semai', kondisi: 'Sehat', foto: '' }
            ]);

            const [activeTab, setActiveTab] = useState('master');
            const [showModal, setShowModal] = useState(false);
            const [modalType, setModalType] = useState('plant'); // 'plant' atau 'log'
            const [editingItem, setEditingItem] = useState(null);
            const [tempImage, setTempImage] = useState('');
            const fileInputRef = useRef(null);

            const calculateAge = (dateString) => {
                const start = new Date(dateString);
                const now = new Date();
                start.setHours(0, 0, 0, 0);
                return Math.max(0, Math.floor((now - start) / (1000 * 60 * 60 * 24)));
            };

            const activeCount = plants.filter(p => p.status === 'Hidup').length;

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => setTempImage(reader.result);
                    reader.readAsDataURL(file);
                }
            };

            const handleSavePlant = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const nama = formData.get('nama');
                const foto = tempImage || (editingItem ? editingItem.foto : '');
                
                if (editingItem) {
                    setPlants(plants.map(p => p.id === editingItem.id ? { 
                        ...p, 
                        nama, 
                        varietas: formData.get('varietas'), 
                        media: formData.get('media'), 
                        tanggal: formData.get('tanggal'), 
                        status: formData.get('status'), 
                        foto 
                    } : p));
                } else {
                    const newId = `PLN-${Math.floor(Math.random() * 900) + 100}`;
                    setPlants([...plants, { 
                        id: newId, 
                        nama, 
                        varietas: formData.get('varietas'), 
                        media: formData.get('media'), 
                        tanggal: formData.get('tanggal'), 
                        status: 'Hidup', 
                        foto 
                    }]);
                }
                closeModals();
            };

            const handleSaveLog = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const pId = formData.get('plantId');
                const kond = formData.get('kondisi');
                const foto = tempImage || (editingItem ? editingItem.foto : '');
                
                if (editingItem) {
                    setLogs(logs.map(l => l.id === editingItem.id ? {
                        ...l,
                        plantId: pId,
                        tanggal: formData.get('tanggal'),
                        tinggi: Number(formData.get('tinggi')),
                        daun: Number(formData.get('daun')),
                        fase: formData.get('fase'),
                        kondisi: kond,
                        foto
                    } : l));
                } else {
                    setLogs([{ 
                        id: Date.now(), 
                        plantId: pId, 
                        tanggal: formData.get('tanggal'), 
                        tinggi: Number(formData.get('tinggi')), 
                        daun: Number(formData.get('daun')), 
                        fase: formData.get('fase'), 
                        kondisi: kond, 
                        foto 
                    }, ...logs]);
                }
                setPlants(plants.map(p => p.id === pId ? { ...p, status: kond === 'Mati' ? 'Mati' : 'Hidup' } : p));
                closeModals();
            };

            const closeModals = () => { setShowModal(false); setEditingItem(null); setTempImage(''); };

            return (
                <div className="max-w-md mx-auto min-h-screen bg-slate-50 pb-24 shadow-xl flex flex-col">
                    <input type="file" ref={fileInputRef} accept="image/*" capture="environment" onChange={handleFileChange} className="hidden" />
                    
                    {/* Header Sederhana */}
                    <header className="bg-white p-6 rounded-b-[2rem] shadow-sm sticky top-0 z-10 border-b border-slate-100">
                        <div className="flex justify-between items-center mb-6">
                            <div>
                                <h1 className="text-2xl font-bold text-emerald-800 flex items-center gap-2">
                                    <Icon name="leaf" size={24} className="text-emerald-500" /> TikaPlant's
                                </h1>
                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Sistem Monitoring Kebun</p>
                            </div>
                            <div className="flex gap-2 text-center bg-slate-50 p-2 px-3 rounded-xl border border-slate-100">
                                <div className="pr-2 border-r border-slate-200">
                                    <div className="text-[9px] font-bold text-slate-400">HIDUP</div>
                                    <div className="text-lg font-bold text-emerald-600 leading-none">{activeCount}</div>
                                </div>
                                <div className="pl-2">
                                    <div className="text-[9px] font-bold text-slate-400">TOTAL</div>
                                    <div className="text-lg font-bold text-slate-500 leading-none">{plants.length}</div>
                                </div>
                            </div>
                        </div>

                        {/* Navigasi Tab */}
                        <nav className="flex gap-8 border-b border-slate-50">
                            <button onClick={() => setActiveTab('master')} className={`pb-2 text-xs font-bold uppercase tracking-wider relative transition-all ${activeTab === 'master' ? 'text-emerald-700' : 'text-slate-300'}`}>
                                Daftar
                                {activeTab === 'master' && <div className="absolute bottom-0 left-0 w-full h-0.5 bg-emerald-600 rounded-full" />}
                            </button>
                            <button onClick={() => setActiveTab('logs')} className={`pb-2 text-xs font-bold uppercase tracking-wider relative transition-all ${activeTab === 'logs' ? 'text-emerald-700' : 'text-slate-300'}`}>
                                Log Harian
                                {activeTab === 'logs' && <div className="absolute bottom-0 left-0 w-full h-0.5 bg-emerald-600 rounded-full" />}
                            </button>
                        </nav>
                    </header>

                    {/* Konten Utama */}
                    <div className="p-4 flex-1">
                        {activeTab === 'master' ? (
                            <div className="space-y-3 fade-in">
                                {plants.map(p => (
                                    <div key={p.id} className={`bg-white p-3 rounded-2xl flex items-center gap-4 shadow-sm border border-slate-100 transition-all active:scale-[0.98] ${p.status === 'Mati' ? 'opacity-50 grayscale bg-slate-50' : ''}`}>
                                        <div className="w-14 h-14 rounded-xl bg-slate-100 overflow-hidden border border-slate-50 flex-shrink-0 shadow-inner">
                                            {p.foto ? <img src={p.foto} className="w-full h-full object-cover" /> : <Icon name="image" size={20} className="w-full h-full p-4 text-slate-200" />}
                                        </div>
                                        <div className="flex-1 min-w-0">
                                            <div className="text-sm font-bold text-slate-800 leading-tight truncate">{p.nama}</div>
                                            <div className="text-[10px] text-slate-400 uppercase font-bold tracking-tight mt-1">{p.id} • {calculateAge(p.tanggal)} Hari</div>
                                        </div>
                                        <button onClick={() => { setModalType('plant'); setEditingItem(p); setTempImage(p.foto); setShowModal(true); }} className="p-2 text-slate-300 hover:text-emerald-500 transition-colors"><Icon name="edit-2" size={16} /></button>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="space-y-3 fade-in">
                                {logs.length === 0 ? (
                                    <div className="text-center py-20 text-slate-300 italic text-sm">Belum ada catatan log.</div>
                                ) : logs.map(l => (
                                    <div key={l.id} className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                                        <div className="flex items-center gap-3 mb-3 pb-2 border-b border-slate-50">
                                            <div className="w-10 h-10 rounded-lg bg-slate-100 overflow-hidden border shadow-inner">
                                                {l.foto ? <img src={l.foto} className="w-full h-full object-cover" /> : <Icon name="camera" size={14} className="w-full h-full p-3 text-slate-200" />}
                                            </div>
                                            <div className="flex-1">
                                                <div className="text-xs font-bold text-emerald-800">{l.plantId}</div>
                                                <div className="text-[9px] text-slate-400 uppercase font-bold">{l.tanggal}</div>
                                            </div>
                                            <div className="text-[9px] font-bold px-2 py-0.5 rounded bg-emerald-50 text-emerald-600 uppercase border border-emerald-100">{l.fase}</div>
                                        </div>
                                        <div className="flex justify-between items-center text-xs font-bold text-slate-600">
                                            <div className="flex gap-4">
                                                <span className="flex items-center gap-1"><Icon name="trending-up" size={12} className="text-emerald-400"/> {l.tinggi} cm</span>
                                                <span className="flex items-center gap-1"><Icon name="leaf" size={12} className="text-emerald-400"/> {l.daun} Daun</span>
                                            </div>
                                            <div className="flex items-center gap-2">
                                                <span className={l.kondisi === 'Mati' ? 'text-rose-500' : 'text-emerald-500'}>{l.kondisi}</span>
                                                <button onClick={() => { setModalType('log'); setEditingItem(l); setTempImage(l.foto); setShowModal(true); }} className="text-slate-300"><Icon name="edit-3" size={14}/></button>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* Tombol Tambah Melayang */}
                    <button onClick={() => { setModalType(activeTab === 'master' ? 'plant' : 'log'); setEditingItem(null); setTempImage(''); setShowModal(true); }} className="fixed bottom-8 right-8 w-14 h-14 bg-emerald-600 text-white rounded-full shadow-xl flex items-center justify-center active:scale-90 transition-transform z-20 border-4 border-white">
                        <Icon name="plus" size={24} />
                    </button>

                    {/* Modal Input Gabungan */}
                    {showModal && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-[2px] z-50 flex items-center justify-center p-6">
                            <div className="bg-white w-full rounded-[2.5rem] p-8 shadow-2xl max-h-[90vh] overflow-y-auto">
                                <div className="flex justify-between items-center mb-8">
                                    <h3
