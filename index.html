<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikaPlant's Dashboard</title>
    <!-- Library React & Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            background-color: #f8fafc;
        }
        .fade-in { animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        #root { overflow-x: hidden; }
    </style>
</head>
<body class="text-slate-700 text-sm">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        // Komponen Ikon Menggunakan SVG Langsung (Pasti Muncul di HP)
        const Icon = ({ name, size = 18, className = "" }) => {
            const icons = {
                leaf: <path d="M11 20a7 7 0 0 1-7-7c0-2.3 1.3-4.5 3.3-5.3A7 7 0 0 1 18 13a7 7 0 0 1-7 7z M2 21l9-9 M7 13h5 M11 12h5" />,
                plus: <path d="M12 5v14M5 12h14" />,
                "edit-2": <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z" />,
                "edit-3": <path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />,
                "trash-2": <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M10 11v6M14 11v6" />,
                image: (
                    <React.Fragment>
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                        <circle cx="8.5" cy="8.5" r="1.5" />
                        <polyline points="21 15 16 10 5 21" />
                    </React.Fragment>
                ),
                camera: (
                    <React.Fragment>
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
                        <circle cx="12" cy="13" r="4" />
                    </React.Fragment>
                ),
                x: <path d="M18 6L6 18M6 6l12 12" />,
                "trending-up": (
                    <React.Fragment>
                        <polyline points="23 6 13.5 15.5 8.5 10.5 1 18" />
                        <polyline points="17 6 23 6 23 12" />
                    </React.Fragment>
                ),
                calendar: (
                    <React.Fragment>
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                        <line x1="16" y1="2" x2="16" y2="6" />
                        <line x1="8" y1="2" x2="8" y2="6" />
                        <line x1="3" y1="10" x2="21" y2="10" />
                    </React.Fragment>
                ),
                mapPin: (
                    <React.Fragment>
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                        <circle cx="12" cy="10" r="3" />
                    </React.Fragment>
                )
            };

            return (
                <svg 
                    width={size} 
                    height={size} 
                    viewBox="0 0 24 24" 
                    fill="none" 
                    stroke="currentColor" 
                    strokeWidth="2.5" 
                    strokeLinecap="round" 
                    strokeLinejoin="round" 
                    className={className}
                >
                    {icons[name] || null}
                </svg>
            );
        };

        const App = () => {
            // DATA MASTER: 18 TANAMAN
            const [plants, setPlants] = useState([
                { id: 'STE-001', nama: 'Snapdragon Tetra', varietas: 'Floral', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
                { id: 'DPE-001', nama: 'Dwarf Petunia', varietas: 'Miniature', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
                { id: 'ACR-001', nama: 'Aster Crego', varietas: 'Perennial', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
                { id: 'KAN-001', nama: 'Kangkung', varietas: 'Darat', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
                { id: 'THI-001', nama: 'Terong Hijau', varietas: 'Lalap', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
                { id: 'TUN-001', nama: 'Terong Ungu', varietas: 'Panjang', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
                { id: 'CAB-001', nama: 'Cabai', varietas: 'Rawit', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
                { id: 'STR-001', nama: 'Stroberi', varietas: 'Manis', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
                { id: 'BAY-001', nama: 'Bayam', varietas: 'Cabut', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
                { id: 'CIP-001', nama: 'Ciplukan', varietas: 'Liar', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
                { id: 'LBU-001', nama: 'Lidah Buaya', varietas: 'Aloe Vera', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
                { id: 'ANG-001', nama: 'Anggrek', varietas: 'Pot 1', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
                { id: 'ANG-002', nama: 'Anggrek', varietas: 'Pot 2', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
                { id: 'ANG-003', nama: 'Anggrek', varietas: 'Pot 3', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
                { id: 'LME-001', nama: 'Lidah Mertua', varietas: 'Pot 1', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
                { id: 'LME-002', nama: 'Lidah Mertua', varietas: 'Pot 2', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
                { id: 'LME-003', nama: 'Lidah Mertua', varietas: 'Pot 3', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
                { id: 'SER-001', nama: 'Sereh', varietas: 'Dapur', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' }
            ]);

            // DATA LOG: 8 LOG AWAL
            const [logs, setLogs] = useState([
                { id: 201, plantId: 'STE-001', tanggal: '2026-03-30', tinggi: 0, daun: 0, fase: 'Semai', kondisi: 'Sehat', foto: '' },
                { id: 202, plantId: 'DPE-001', tanggal: '2026-03-30', tinggi: 0, daun: 0, fase: 'Semai', kondisi: 'Sehat', foto: '' },
                { id: 203, plantId: 'ACR-001', tanggal: '2026-03-30', tinggi: 0, daun: 0, fase: 'Semai', kondisi: 'Sehat', foto: '' },
                { id: 204, plantId: 'KAN-001', tanggal: '2026-03-30', tinggi: 0, daun: 0, fase: 'Semai', kondisi: 'Sehat', foto: '' },
                { id: 205, plantId: 'THI-001', tanggal: '2026-03-30', tinggi: 0, daun: 0, fase: 'Semai', kondisi: 'Sehat', foto: '' },
                { id: 206, plantId: 'TUN-001', tanggal: '2026-03-30', tinggi: 0, daun: 0, fase: 'Semai', kondisi: 'Sehat', foto: '' },
                { id: 207, plantId: 'CAB-001', tanggal: '2026-03-30', tinggi: 0, daun: 0, fase: 'Semai', kondisi: 'Sehat', foto: '' },
                { id: 208, plantId: 'STR-001', tanggal: '2026-03-30', tinggi: 0, daun: 0, fase: 'Semai', kondisi: 'Sehat', foto: '' }
            ]);

            const [activeTab, setActiveTab] = useState('master');
            const [showModal, setShowModal] = useState(false);
            const [modalType, setModalType] = useState('plant'); 
            const [editingItem, setEditingItem] = useState(null);
            const [tempImage, setTempImage] = useState('');
            const fileInputRef = useRef(null);

            const calculateAge = (dateString) => {
                const start = new Date(dateString);
                const now = new Date();
                start.setHours(0, 0, 0, 0);
                return Math.max(0, Math.floor((now - start) / (1000 * 60 * 60 * 24)));
            };

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => setTempImage(reader.result);
                    reader.readAsDataURL(file);
                }
            };

            const handleSavePlant = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const nama = formData.get('nama');
                const foto = tempImage || (editingItem ? editingItem.foto : '');
                
                if (editingItem) {
                    setPlants(plants.map(p => p.id === editingItem.id ? { 
                        ...p, nama, varietas: formData.get('varietas'), 
                        media: formData.get('media'), tanggal: formData.get('tanggal'), 
                        status: formData.get('status'), foto 
                    } : p));
                } else {
                    const prefix = nama.substring(0, 3).toUpperCase();
                    const newId = `${prefix}-${Math.floor(Math.random() * 900) + 100}`;
                    setPlants([...plants, { id: newId, nama, varietas: formData.get('varietas'), media: formData.get('media'), tanggal: formData.get('tanggal'), status: 'Hidup', foto }]);
                }
                closeModals();
            };

            const handleSaveLog = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const pId = formData.get('plantId');
                const kond = formData.get('kondisi');
                const foto = tempImage || (editingItem ? editingItem.foto : '');
                
                if (editingItem) {
                    setLogs(logs.map(l => l.id === editingItem.id ? {
                        ...l, plantId: pId, tanggal: formData.get('tanggal'), 
                        tinggi: Number(formData.get('tinggi')), daun: Number(formData.get('daun')), 
                        fase: formData.get('fase'), kondisi: kond, foto
                    } : l));
                } else {
                    setLogs([{ id: Date.now(), plantId: pId, tanggal: formData.get('tanggal'), tinggi: Number(formData.get('tinggi')), daun: Number(formData.get('daun')), fase: formData.get('fase'), kondisi: kond, foto }, ...logs]);
                }
                setPlants(plants.map(p => p.id === pId ? { ...p, status: kond === 'Mati' ? 'Mati' : 'Hidup' } : p));
                closeModals();
            };

            const handleDeletePlant = (id) => {
                if(window.confirm("Hapus tanaman ini dan riwayatnya?")) {
                    setPlants(plants.filter(p => p.id !== id));
                    setLogs(logs.filter(l => l.plantId !== id));
                }
            };

            const handleDeleteLog = (id) => {
                if(window.confirm("Hapus log harian ini?")) {
                    setLogs(logs.filter(l => l.id !== id));
                }
            };

            const closeModals = () => { setShowModal(false); setEditingItem(null); setTempImage(''); };

            return (
                <div className="max-w-md mx-auto min-h-screen bg-slate-50 pb-24 shadow-2xl flex flex-col relative overflow-x-hidden">
                    <input type="file" ref={fileInputRef} accept="image/*" capture="environment" onChange={handleFileChange} className="hidden" />
                    
                    {/* Header */}
                    <header className="bg-white p-6 rounded-b-[2.5rem] shadow-sm sticky top-0 z-20 border-b border-slate-100">
                        <div className="flex justify-between items-center mb-6">
                            <div>
                                <h1 className="text-2xl font-bold text-emerald-800 flex items-center gap-2">
                                    <Icon name="leaf" size={24} className="text-emerald-500" /> TikaPlant's
                                </h1>
                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Sistem Monitoring Kebun</p>
                            </div>
                            <div className="flex gap-2 bg-slate-50 p-2 px-3 rounded-xl border border-slate-100 shadow-inner">
                                <div className="pr-2 border-r border-slate-200 text-center">
                                    <div className="text-[9px] font-bold text-slate-400 uppercase leading-none mb-1">Hidup</div>
                                    <div className="text-lg font-bold text-emerald-600 leading-none">{plants.filter(p => p.status === 'Hidup').length}</div>
                                </div>
                                <div className="pl-2 text-center">
                                    <div className="text-[9px] font-bold text-slate-400 uppercase leading-none mb-1">Total</div>
                                    <div className="text-lg font-bold text-slate-500 leading-none">{plants.length}</div>
                                </div>
                            </div>
                        </div>

                        <nav className="flex gap-8">
                            <button onClick={() => setActiveTab('master')} className={`pb-2 text-xs font-bold uppercase tracking-wider relative transition-all ${activeTab === 'master' ? 'text-emerald-700' : 'text-slate-300'}`}>
                                Daftar Tanaman
                                {activeTab === 'master' && <div className="absolute bottom-0 left-0 w-full h-1 bg-emerald-600 rounded-full" />}
                            </button>
                            <button onClick={() => setActiveTab('logs')} className={`pb-2 text-xs font-bold uppercase tracking-wider relative transition-all ${activeTab === 'logs' ? 'text-emerald-700' : 'text-slate-300'}`}>
                                Log Harian
                                {activeTab === 'logs' && <div className="absolute bottom-0 left-0 w-full h-1 bg-emerald-600 rounded-full" />}
                            </button>
                        </nav>
                    </header>

                    {/* Konten Utama */}
                    <div className="p-4 flex-1">
                        {activeTab === 'master' ? (
                            <div className="space-y-4 fade-in">
                                {plants.map(p => (
                                    <div key={p.id} className={`bg-white p-4 rounded-3xl shadow-md border border-slate-100 transition-all ${p.status === 'Mati' ? 'opacity-60 grayscale bg-slate-50' : ''}`}>
                                        {/* Bagian Atas Kartu: Foto, ID, Tanggal, Status */}
                                        <div className="flex items-center gap-3 mb-3 pb-2 border-b border-slate-50">
                                            <div className="w-12 h-12 rounded-xl bg-slate-100 overflow-hidden border shadow-inner flex-shrink-0 flex items-center justify-center">
                                                {p.foto ? <img src={p.foto} className="w-full h-full object-cover" /> : <Icon name="image" size={18} className="text-slate-300" />}
                                            </div>
                                            <div className="flex-1 min-w-0">
                                                <div className="text-xs font-bold text-emerald-800 truncate uppercase tracking-tight">{p.id}</div>
                                                <div className="text-[9px] text-slate-400 font-bold uppercase tracking-tighter">Mulai: {p.tanggal}</div>
                                            </div>
                                            <span className={`text-[10px] font-bold px-3 py-1 rounded-lg uppercase border ${p.status === 'Mati' ? 'bg-rose-50 text-rose-600 border-rose-100' : 'bg-emerald-50 text-emerald-600 border-emerald-100'}`}>
                                                {p.status}
                                            </span>
                                        </div>

                                        {/* Bagian Bawah Kartu: Info Tanaman & Tombol Aksi */}
                                        <div className="flex justify-between items-end text-xs font-bold text-slate-600">
                                            <div className="space-y-0.5">
                                                <div className="text-[15px] font-black text-slate-800 leading-tight truncate max-w-[150px]">{p.nama}</div>
                                                <div className="flex gap-2 items-center text-[10px] text-slate-400 font-medium">
                                                    <span className="flex items-center gap-1"><Icon name="leaf" size={10} className="text-emerald-400"/> {p.varietas}</span>
                                                    <span className="w-1 h-1 bg-slate-200 rounded-full"></span>
                                                    <span>{calculateAge(p.tanggal)} HARI</span>
                                                </div>
                                            </div>
                                            
                                            {/* AREA TOMBOL AKSI */}
                                            <div className="flex items-center gap-1.5 flex-shrink-0">
                                                <button 
                                                    onClick={() => { setModalType('plant'); setEditingItem(p); setTempImage(p.foto); setShowModal(true); }} 
                                                    className="w-10 h-10 flex items-center justify-center bg-blue-100 text-blue-700 rounded-xl active:scale-90 transition-all border border-blue-200"
                                                >
                                                    <Icon name="edit-2" size={18} />
                                                </button>
                                                <button 
                                                    onClick={() => handleDeletePlant(p.id)} 
                                                    className="w-10 h-10 flex items-center justify-center bg-red-100 text-red-700 rounded-xl active:scale-90 transition-all border border-red-200"
                                                >
                                                    <Icon name="trash-2" size={18} />
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="space-y-4 fade-in">
                                {logs.length === 0 ? (
                                    <div className="text-center py-20 text-slate-300 italic">Belum ada catatan log harian.</div>
                                ) : logs.map(l => (
                                    <div key={l.id} className="bg-white p-4 rounded-3xl shadow-md border border-slate-100">
                                        <div className="flex items-center gap-3 mb-3 pb-2 border-b border-slate-50">
                                            <div className="w-12 h-12 rounded-lg bg-slate-100 overflow-hidden border shadow-inner flex-shrink-0 flex items-center justify-center">
                                                {l.foto ? <img src={l.foto} className="w-full h-full object-cover" /> : <Icon name="camera" size={18} className="text-slate-300" />}
                                            </div>
                                            <div className="flex-1 min-w-0">
                                                <div className="text-xs font-bold text-emerald-800 truncate uppercase tracking-tight">{l.plantId}</div>
                                                <div className="text-[9px] text-slate-400 uppercase font-bold tracking-tighter">Cek: {l.tanggal}</div>
                                            </div>
                                            <span className="text-[10px] font-bold px-3 py-1 rounded-lg bg-emerald-50 text-emerald-600 uppercase border border-emerald-100">{l.fase}</span>
                                        </div>
                                        <div className="flex justify-between items-center text-xs font-bold text-slate-600">
                                            <div className="flex gap-4">
                                                <span className="flex items-center gap-1"><Icon name="trending-up" size={12} className="text-emerald-400"/> {l.tinggi} cm</span>
                                                <span className="flex items-center gap-1"><Icon name="leaf" size={12} className="text-emerald-400"/> {l.daun} Daun</span>
                                            </div>
                                            <div className="flex items-center gap-2">
                                                <span className={`${l.kondisi === 'Mati' ? 'text-rose-600 bg-rose-50' : 'text-emerald-600 bg-emerald-50'} px-2 py-0.5 rounded-md`}>{l.kondisi}</span>
                                                <div className="flex gap-1 border-l pl-2 border-slate-100">
                                                    <button onClick={() => { setModalType('log'); setEditingItem(l); setTempImage(l.foto); setShowModal(true); }} className="w-9 h-9 flex items-center justify-center bg-blue-50 text-blue-600 rounded-xl active:scale-90 border border-blue-100"><Icon name="edit-3" size={16}/></button>
                                                    <button onClick={() => handleDeleteLog(l.id)} className="w-9 h-9 flex items-center justify-center bg-red-50 text-red-600 rounded-xl active:scale-90 border border-red-100"><Icon name="trash-2" size={16}/></button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* Tombol Tambah Melayang */}
                    <button 
                        onClick={() => { setModalType(activeTab === 'master' ? 'plant' : 'log'); setEditingItem(null); setTempImage(''); setShowModal(true); }} 
                        className="fixed bottom-8 right-8 w-16 h-16 bg-emerald-600 text-white rounded-full shadow-2xl flex items-center justify-center active:scale-90 transition-transform z-30 border-4 border-white"
                    >
                        <Icon name="plus" size={32} />
                    </button>

                    {/* Modal Input */}
                    {showModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-[4px] z-50 flex items-center justify-center p-6">
                            <div className="bg-white w-full rounded-[2.5rem] p-8 shadow-2xl max-h-[90vh] overflow-y-auto fade-in">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="font-bold text-slate-800 uppercase tracking-tighter text-base">{editingItem ? 'Edit' : 'Tambah'} {modalType === 'plant' ? 'Tanaman' : 'Log'}</h3>
                                    <button onClick={closeModals} className="w-10 h-10 flex items-center justify-center bg-slate-100 text-slate-400 rounded-full"><Icon name="x" size={20} /></button>
                                </div>
                                
                                <form onSubmit={modalType === 'plant' ? handleSavePlant : handleSaveLog} className="space-y-5">
                                    <div className="flex flex-col items-center p-6 bg-slate-50 rounded-3xl border-2 border-dashed border-slate-200 active:bg-slate-100 transition-colors cursor-pointer shadow-inner" onClick={() => fileInputRef.current.click()}>
                                        <div className="w-24 h-24 rounded-2xl bg-white border-4 border-white shadow-lg overflow-hidden flex items-center justify-center mb-3">
                                            {tempImage ? <img src={tempImage} className="w-full h-full object-cover" /> : <Icon name="camera" size={40} className="text-slate-200" />}
                                        </div>
                                        <div className="text-[10px] font-bold text-emerald-700 uppercase tracking-widest text-center">Ambil Foto HP</div>
                                    </div>

                                    {modalType === 'plant' ? (
                                        <div className="space-y-4">
                                            <div className="space-y-1">
                                                <label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Nama Tanaman</label>
                                                <input name="nama" defaultValue={editingItem?.nama} required className="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:bg-white focus:border-emerald-300 font-semibold" />
                                            </div>
                                            <div className="grid grid-cols-2 gap-3">
                                                <div className="space-y-1">
                                                    <label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Varietas</label>
                                                    <input name="varietas" defaultValue={editingItem?.varietas} placeholder="Varietas" className="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:bg-white" />
                                                </div>
                                                <div className="space-y-1">
                                                    <label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Status</label>
                                                    <select name="status" defaultValue={editingItem?.status || 'Hidup'} className="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 font-bold outline-none"><option>Hidup</option><option>Mati</option></select>
                                                </div>
                                            </div>
                                            <div className="grid grid-cols-2 gap-3">
                                                <div className="space-y-1">
                                                    <label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Media</label>
                                                    <select name="media" defaultValue={editingItem?.media || 'Tanah'} className="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none"><option>Tanah</option><option>Hidroponik</option></select>
                                                </div>
                                                <div className="space-y-1">
                                                    <label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Tgl Tanam</label>
                                                    <input type="date" name="tanggal" defaultValue={editingItem?.tanggal || '2026-03-28'} className="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none" />
                                                </div>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="space-y-4 text-sm">
                                            <div className="space-y-1">
                                                <label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Pilih Tanaman</label>
                                                <select name="plantId" defaultValue={editingItem?.plantId} className="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 font-bold outline-none">
                                                    {plants.map(p => <option key={p.id} value={p.id}>{p.id} - {p.nama}</option>)}
                                                </select>
                                            </div>
                                            <div className="grid grid-cols-2 gap-3">
                                                <div className="space-y-1">
                                                    <label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Tinggi (cm)</label>
                                                    <input type="number" step="0.1" name="tinggi" defaultValue={editingItem?.tinggi} placeholder="0.0" className="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none" />
                                                </div>
                                                <div className="space-y-1">
                                                    <label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Daun</label>
                                                    <input type="number" name="daun" defaultValue={editingItem?.daun} placeholder="0" className="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none" />
                                                </div>
                                            </div>
                                            <div className="grid grid-cols-2 gap-3">
                                                <div className="space-y-1">
                                                    <label className="text-[10px] font-bold text-emerald-600 uppercase ml-1">Fase</label>
                                                    <select name="fase" defaultValue={editingItem?.fase || 'Semai'} className="w-full p-4 bg-emerald-50 text-emerald-700 rounded-2xl font-bold border border-emerald-100 outline-none">
                                                        <option>Semai</option><option>Tumbuh Daun</option><option>Berbunga</option><option>Berbuah</option>
                                                    </select>
                                                </div>
                                                <div className="space-y-1">
                                                    <label className="text-[10px] font-bold text-rose-600 uppercase ml-1">Kondisi</label>
                                                    <select name="kondisi" defaultValue={editingItem?.kondisi || 'Sehat'} className="w-full p-4 bg-rose-50 text-rose-700 rounded-2xl font-bold border border-rose-100 outline-none">
                                                        <option value="Sehat">Sehat</option><option value="Kuning">Kuning</option><option value="Layu">Layu</option><option value="Mati">MATI</option>
                                                    </select>
                                                </div>
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Tanggal Cek</label>
                                                <input type="date" name="tanggal" defaultValue={editingItem?.tanggal || new Date().toISOString().split('T')[0]} className="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none" />
                                            </div>
                                        </div>
                                    )}
                                    <button type="submit" className="w-full bg-emerald-600 text-white p-5 rounded-[1.5rem] font-bold uppercase tracking-[0.2em] text-[11px] shadow-xl shadow-emerald-200 active:scale-95 transition-all">Simpan Data</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
