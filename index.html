<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikaPlant's Dashboard</title>
    <!-- Library Pendukung -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase Libraries -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            background-color: #f8fafc;
        }
        .fade-in { animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .modal-up { animation: modalUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes modalUp { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-slate-700 text-sm">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, Fragment } = React;

        const MY_CLOUD_CONFIG = {
            apiKey: "AIzaSyBJS2wHHjLonDIhtcqE2IZllTZOVu2w01M", 
            authDomain: "tikaplant-s.firebaseapp.com",
            projectId: "tikaplant-s",
            storageBucket: "tikaplant-s.firebasestorage.app",
            messagingSenderId: "857994265566",
            appId: "1:857994265566:web:bf5c6bf879c1b9a36a134f",
            measurementId: "G-3MEKH8YZRX"
        };

        const MY_APP_ID = "tika-plant-dashboard";

        // Definisi Tray sesuai permintaan Tika
        const TRAYS = [
            { id: 'tray_a', label: 'Tray A', rows: 5, cols: 5 },
            { id: 'tray_b', label: 'Tray B', rows: 5, cols: 5 },
            { id: 'tray_c', label: 'Tray C', rows: 12, cols: 12 },
            { id: 'tray_d', label: 'Tray D', rows: 12, cols: 12 },
        ];

        let db = null; let auth = null;

        try {
            if (!firebase.apps.length) firebase.initializeApp(MY_CLOUD_CONFIG);
            db = firebase.firestore(); auth = firebase.auth();
        } catch (e) { console.warn("Firebase Offline"); }

        const Icon = ({ name, size = 18, className = "" }) => {
            const icons = {
                flower: (
                    <Fragment>
                        <circle cx="12" cy="12" r="2.5" fill="#f472b6" />
                        <path d="M12 7.5c1.5-4.5 7.5-4.5 7.5 0s-6 7.5-7.5 7.5-7.5-3-7.5-7.5 6-4.5 7.5 0z" opacity="0.4" fill="#f472b6" />
                        <path d="M16.5 12c4.5 1.5 4.5 7.5 0 7.5s-7.5-6-7.5-7.5 3-7.5 7.5-7.5 4.5 6 0 7.5z" opacity="0.4" fill="#f472b6" />
                        <path d="M12 16.5c-1.5 4.5-7.5 4.5-7.5 0s6-7.5 7.5-7.5 7.5 3 7.5 7.5-6 4.5-7.5 0z" opacity="0.4" fill="#f472b6" />
                        <path d="M7.5 12c-4.5-1.5-4.5-7.5 0-7.5s7.5 6 7.5 7.5-3 7.5-7.5 7.5-4.5-6 0-7.5z" opacity="0.4" fill="#f472b6" />
                    </Fragment>
                ),
                cloud: <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z" stroke="currentColor" strokeWidth="2"/>,
                lock: <Fragment><rect x="3" y="11" width="18" height="11" rx="2" ry="2" stroke="currentColor" strokeWidth="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="currentColor" strokeWidth="2"/></Fragment>,
                plus: <path d="M12 5v14M5 12h14" stroke="currentColor" strokeWidth="3"/>,
                trash: <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" stroke="currentColor" strokeWidth="2"/>,
                edit: <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z" stroke="currentColor" strokeWidth="2"/>,
                x: <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" strokeWidth="3"/>,
                search: <Fragment><circle cx="11" cy="11" r="8" stroke="currentColor" strokeWidth="2"/><line x1="21" y1="21" x2="16.65" y2="16.65" stroke="currentColor" strokeWidth="2"/></Fragment>,
                tray: <Fragment><rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" strokeWidth="2"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18" stroke="currentColor" strokeWidth="1" opacity="0.4"/></Fragment>,
                camera: (
                    <Fragment>
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" stroke="currentColor" strokeWidth="2"/>
                        <circle cx="12" cy="13" r="4" stroke="currentColor" strokeWidth="2"/>
                    </Fragment>
                )
            };
            return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" className={className}>{icons[name] || null}</svg>;
        };

        const App = () => {
            const [plants, setPlants] = useState([]);
            const [logs, setLogs] = useState([]);
            const [trayData, setTrayData] = useState({});
            const [user, setUser] = useState(null);
            const [isOnline, setIsOnline] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [activeTab, setActiveTab] = useState('master');
            const [activeTray, setActiveTray] = useState(TRAYS[0]); // Default Tray A
            const [searchQuery, setSearchQuery] = useState('');
            const [showModal, setShowModal] = useState(false);
            const [modalType, setModalType] = useState('plant');
            const [editingItem, setEditingItem] = useState(null);
            const [tempImage, setTempImage] = useState('');
            const fileRef = useRef(null);

            useEffect(() => {
                if (!auth) return;
                auth.signInAnonymously().then(res => setUser(res.user)).catch(() => console.warn("Offline Mode"));
            }, []);

            useEffect(() => {
                if (!user || !db) return;
                const baseRef = db.collection('artifacts').doc(MY_APP_ID).collection('public').doc('data');
                
                const unsubP = baseRef.collection('plants').onSnapshot(snap => {
                    setPlants(snap.docs.map(d => ({id: d.id, ...d.data()})));
                    setIsOnline(true);
                });

                const unsubL = baseRef.collection('logs').onSnapshot(snap => {
                    const data = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    data.sort((a, b) => new Date(b.tanggal) - new Date(a.tanggal));
                    setLogs(data);
                });

                const unsubT = baseRef.collection('seedling_tray').onSnapshot(snap => {
                    const data = {};
                    snap.docs.forEach(doc => { data[doc.id] = doc.data(); });
                    setTrayData(data);
                });

                return () => { unsubP(); unsubL(); unsubT(); };
            }, [user]);

            const resizeImage = (base64Str) => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.src = base64Str;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_SIZE = 300;
                        let w = img.width, h = img.height;
                        if (w > h) { if (w > MAX_SIZE) { h *= MAX_SIZE / w; w = MAX_SIZE; } }
                        else { if (h > MAX_SIZE) { w *= MAX_SIZE / h; h = MAX_SIZE; } }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL('image/jpeg', 0.5));
                    };
                });
            };

            const handleFileChange = async (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = async () => setTempImage(await resizeImage(reader.result));
                    reader.readAsDataURL(file);
                }
            };

            const generateId = (name) => {
                const prefix = name.substring(0, 3).toUpperCase().padEnd(3, 'X');
                const count = plants.filter(x => x.id.startsWith(prefix)).length;
                return `${prefix}-${(count + 1).toString().padStart(3, '0')}`;
            };

            const handleSave = async (e) => {
                e.preventDefault();
                if (isSaving) return;
                setIsSaving(true);
                try {
                    const f = new FormData(e.target);
                    const data = Object.fromEntries(f.entries());
                    data.foto = tempImage || editingItem?.foto || '';

                    const col = modalType === 'plant' ? 'plants' : (modalType === 'log' ? 'logs' : 'seedling_tray');
                    const ref = db.collection('artifacts').doc(MY_APP_ID).collection('public').doc('data').collection(col);
                    
                    if (modalType === 'tray_cell') {
                        // Simpan dengan ID unik: trayid_cell_i
                        await ref.doc(editingItem.cellId).set(data);
                    } else if (editingItem) {
                        await ref.doc(editingItem.id).set(data, {merge: true});
                    } else if (modalType === 'plant') {
                        await ref.doc(generateId(data.nama)).set(data);
                    } else {
                        await ref.add(data);
                    }
                    
                    setShowModal(false); setEditingItem(null); setTempImage('');
                } catch (err) { alert(err.message); } finally { setIsSaving(false); }
            };

            const handleDelete = async (id, type) => {
                if (isOnline && db) {
                    await db.collection('artifacts').doc(MY_APP_ID).collection('public').doc('data')
                          .collection(type === 'plant' ? 'plants' : 'logs').doc(id).delete();
                }
            };

            const handleClearCell = async (cellId) => {
                 if (isOnline && db) {
                    await db.collection('artifacts').doc(MY_APP_ID).collection('public').doc('data')
                          .collection('seedling_tray').doc(cellId).delete();
                    setShowModal(false);
                }
            };

            const filteredPlants = plants.filter(p => p.nama.toLowerCase().includes(searchQuery.toLowerCase()) || p.id.toLowerCase().includes(searchQuery.toLowerCase()));
            const filteredLogs = logs.filter(l => l.plantId.toLowerCase().includes(searchQuery.toLowerCase()) || l.tanggal.includes(searchQuery));

            return (
                <div className="max-w-md mx-auto min-h-screen bg-slate-50 flex flex-col relative pb-24 shadow-2xl overflow-x-hidden">
                    <header className="bg-white p-6 rounded-b-[2.5rem] shadow-sm sticky top-0 z-20 border-b border-slate-100">
                        <div className="flex justify-between items-start mb-6">
                            <div>
                                <h1 className="text-2xl font-bold text-emerald-800 flex items-center gap-2 tracking-tight leading-none">
                                    <Icon name="flower" size={26} /> TikaPlant's
                                </h1>
                                <div className="flex items-center gap-2 mt-1.5">
                                    <div className={`p-1 rounded-full ${isOnline ? 'bg-emerald-50 text-emerald-600 border border-emerald-100 shadow-sm animate-pulse' : 'bg-slate-50 text-slate-300 border border-slate-100'}`}>
                                        <Icon name={isOnline ? 'cloud' : 'lock'} size={12}/>
                                    </div>
                                    <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">{isOnline ? 'AWAN HIJAU AKTIF' : 'OFFLINE'}</span>
                                </div>
                            </div>
                            <div className="flex gap-2">
                                <div className="bg-slate-50 p-2 px-3 rounded-2xl border border-slate-100 text-center shadow-sm">
                                    <div className="text-[8px] font-bold text-slate-400 uppercase mb-1">Hidup</div>
                                    <div className="text-sm font-black text-emerald-600 leading-none">{plants.filter(x => x.status === 'Hidup').length}</div>
                                </div>
                                <div className="bg-slate-50 p-2 px-3 rounded-2xl border border-slate-100 text-center shadow-sm">
                                    <div className="text-[8px] font-bold text-slate-400 uppercase mb-1">Total</div>
                                    <div className="text-sm font-black text-slate-600 leading-none">{plants.length}</div>
                                </div>
                            </div>
                        </div>

                        <nav className="flex gap-6 mb-4 overflow-x-auto no-scrollbar">
                            {[
                                {id: 'master', label: 'Tanaman'},
                                {id: 'logs', label: 'Log'},
                                {id: 'tray', label: 'Penyemaian'}
                            ].map(t => (
                                <button key={t.id} onClick={() => {setActiveTab(t.id); setSearchQuery('');}} className={`pb-2 text-[11px] font-black uppercase tracking-widest relative whitespace-nowrap transition-all ${activeTab === t.id ? 'text-emerald-700' : 'text-slate-300'}`}>
                                    {t.label}
                                    {activeTab === t.id && <div className="absolute bottom-0 left-0 w-full h-1 bg-emerald-600 rounded-full"/>}
                                </button>
                            ))}
                        </nav>

                        {activeTab !== 'tray' ? (
                            <div className="relative">
                                <div className="absolute inset-y-0 left-4 flex items-center text-slate-300"><Icon name="search" size={14} /></div>
                                <input type="text" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} placeholder="Cari data..." className="w-full pl-10 pr-4 py-3 bg-slate-100 rounded-2xl outline-none font-bold text-xs focus:bg-white shadow-inner border-none"/>
                            </div>
                        ) : (
                            <div className="flex gap-2 overflow-x-auto no-scrollbar py-1">
                                {TRAYS.map(t => (
                                    <button 
                                        key={t.id} 
                                        onClick={() => setActiveTray(t)}
                                        className={`px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all border ${activeTray.id === t.id ? 'bg-emerald-600 text-white border-emerald-600 shadow-lg' : 'bg-white text-slate-400 border-slate-100'}`}
                                    >
                                        {t.label} <span className="opacity-50 ml-1">({t.rows}x{t.cols})</span>
                                    </button>
                                ))}
                            </div>
                        )}
                    </header>

                    <main className="p-4 flex-1 space-y-4 fade-in">
                        {activeTab === 'master' && (
                            filteredPlants.length === 0 ? <div className="text-center py-20 text-slate-300 font-bold uppercase text-[10px] tracking-widest leading-relaxed">Belum ada data</div> :
                            filteredPlants.map(p => (
                                <div key={p.id} className={`bg-white p-4 rounded-[2rem] border shadow-sm flex items-center gap-4 ${p.status === 'Mati' ? 'opacity-50 grayscale bg-slate-50' : 'border-slate-100'}`}>
                                    <div className="w-14 h-14 rounded-2xl bg-slate-100 overflow-hidden border border-slate-200 flex-shrink-0">
                                        {p.foto ? <img src={p.foto} className="w-full h-full object-cover"/> : <Icon name="flower" size={24} className="m-auto mt-4 text-slate-200"/>}
                                    </div>
                                    <div className="flex-1 min-w-0">
                                        <div className="text-[10px] font-black text-emerald-800 uppercase tracking-tight">{p.id}</div>
                                        <div className="text-[15px] font-extrabold text-slate-800 truncate my-0.5 leading-none">{p.nama}</div>
                                        <div className="text-[9px] font-bold text-slate-400 uppercase tracking-tighter mt-1">{p.varietas}</div>
                                    </div>
                                    <div className="flex gap-1">
                                        <button onClick={() => {setEditingItem(p); setTempImage(p.foto); setModalType('plant'); setShowModal(true);}} className="p-2.5 bg-blue-50 text-blue-600 rounded-xl border border-blue-100 active:scale-90 shadow-sm"><Icon name="edit" size={16}/></button>
                                        <button onClick={() => handleDelete(p.id, 'plant')} className="p-2.5 bg-rose-50 text-rose-600 rounded-xl border border-rose-100 active:scale-90 shadow-sm"><Icon name="trash" size={16}/></button>
                                    </div>
                                </div>
                            ))
                        )}

                        {activeTab === 'logs' && (
                            filteredLogs.length === 0 ? <div className="text-center py-20 text-slate-300 font-bold uppercase text-[10px] tracking-widest leading-relaxed px-10">Klik (+) untuk menambah log harian.</div> :
                            filteredLogs.map(l => (
                                <div key={l.id} className="bg-white p-5 rounded-[2.5rem] border border-slate-100 shadow-sm space-y-5">
                                    <div className="flex justify-between items-center">
                                        <div className="flex items-center gap-3 text-emerald-900">
                                            <div className="w-10 h-10 rounded-full bg-emerald-50 border border-emerald-100 flex items-center justify-center overflow-hidden">
                                                {l.foto ? <img src={l.foto} className="w-full h-full object-cover" /> : <Icon name="flower" size={18} className="text-emerald-200"/>}
                                            </div>
                                            <div>
                                                <div className="text-[13px] font-black uppercase leading-none tracking-tight">{l.plantId}</div>
                                                <div className="text-[10px] font-bold text-slate-400 mt-1 uppercase tracking-tighter">{l.tanggal}</div>
                                            </div>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={() => {setEditingItem(l); setTempImage(l.foto); setModalType('log'); setShowModal(true);}} className="p-2 bg-blue-50 text-blue-500 rounded-full active:scale-90 shadow-sm border border-blue-100"><Icon name="edit" size={14}/></button>
                                            <button onClick={() => handleDelete(l.id, 'log')} className="p-2 bg-rose-50 text-rose-500 rounded-full active:scale-90 shadow-sm border border-rose-100"><Icon name="trash" size={14}/></button>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-3 gap-2">
                                        <div className="bg-slate-50/70 p-3 rounded-2xl text-center border border-slate-100/50 shadow-inner">
                                            <div className="text-[8px] text-slate-400 uppercase font-black mb-1">TINGGI</div>
                                            <div className="font-extrabold text-slate-700 text-sm">{l.tinggi} cm</div>
                                        </div>
                                        <div className="bg-slate-50/70 p-3 rounded-2xl text-center border border-slate-100/50 shadow-inner">
                                            <div className="text-[8px] text-slate-400 uppercase font-black mb-1">DAUN</div>
                                            <div className="font-extrabold text-slate-700 text-sm">{l.daun} H</div>
                                        </div>
                                        <div className="bg-emerald-50 p-3 rounded-2xl text-center border border-emerald-100 shadow-inner">
                                            <div className="text-[8px] text-emerald-600/70 uppercase font-black mb-1">FASE</div>
                                            <div className="font-extrabold text-emerald-700 text-sm uppercase">{l.fase}</div>
                                        </div>
                                    </div>
                                </div>
                            ))
                        )}

                        {activeTab === 'tray' && (
                            <div className="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-xl overflow-hidden fade-in">
                                <div className="mb-6 flex justify-between items-center px-2">
                                    <div>
                                        <h2 className="text-sm font-black text-slate-800 uppercase tracking-widest leading-none">Lubang {activeTray.label}</h2>
                                        <p className="text-[9px] font-bold text-slate-400 uppercase mt-1">Gunakan jari untuk geser jika tray besar</p>
                                    </div>
                                    <div className="bg-emerald-50 px-3 py-1 rounded-full text-[10px] font-black text-emerald-600 border border-emerald-100">
                                        {Object.keys(trayData).filter(key => key.startsWith(activeTray.id)).length} Terisi
                                    </div>
                                </div>
                                
                                <div className="overflow-x-auto no-scrollbar p-1">
                                    <div 
                                        className="grid gap-2 mb-2"
                                        style={{ 
                                            gridTemplateColumns: `repeat(${activeTray.cols}, minmax(32px, 1fr))`,
                                            width: activeTray.cols > 8 ? `${activeTray.cols * 36}px` : '100%' 
                                        }}
                                    >
                                        {Array.from({length: activeTray.rows * activeTray.cols}).map((_, i) => {
                                            const cellId = `${activeTray.id}_cell_${i}`;
                                            const cell = trayData[cellId];
                                            return (
                                                <button 
                                                    key={i} 
                                                    onClick={() => {
                                                        setEditingItem({...cell, cellId});
                                                        setModalType('tray_cell');
                                                        setShowModal(true);
                                                    }}
                                                    className={`aspect-square rounded-xl flex flex-col items-center justify-center transition-all active:scale-90 border-2 ${cell ? 'bg-emerald-500 border-emerald-400 shadow-lg shadow-emerald-200' : 'bg-slate-100 border-slate-200'}`}
                                                >
                                                    {cell ? (
                                                        <Fragment>
                                                            <div className="text-[7px] font-black text-white uppercase leading-none truncate px-0.5 max-w-full">{cell.nama.substring(0, 3)}</div>
                                                            <div className="w-1 h-1 bg-white rounded-full mt-0.5"></div>
                                                        </Fragment>
                                                    ) : <div className="w-1 h-1 bg-slate-300 rounded-full"></div>}
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>
                                
                                <div className="mt-8 grid grid-cols-2 gap-4 border-t border-slate-100 pt-6">
                                     <div className="flex items-center gap-2">
                                         <div className="w-3 h-3 rounded-md bg-emerald-500"></div>
                                         <span className="text-[9px] font-bold text-slate-400 uppercase">Terisi Bibit</span>
                                     </div>
                                     <div className="flex items-center gap-2">
                                         <div className="w-3 h-3 rounded-md bg-slate-100 border border-slate-200"></div>
                                         <span className="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">Lubang Kosong</span>
                                     </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {activeTab !== 'tray' && (
                        <button onClick={() => {setEditingItem(null); setModalType(activeTab === 'master' ? 'plant' : 'log'); setShowModal(true);}} className="fixed bottom-8 right-8 w-16 h-16 bg-emerald-600 text-white rounded-full shadow-2xl flex items-center justify-center active:scale-90 transition-all z-30 border-4 border-white">
                            <Icon name="plus" size={28}/>
                        </button>
                    )}

                    {showModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-6">
                            <div className="bg-white w-full rounded-[2.5rem] p-8 shadow-2xl max-h-[90vh] overflow-y-auto modal-up relative">
                                <button onClick={()=>setShowModal(false)} className="absolute top-6 right-6 p-2 text-slate-600 hover:text-slate-900 transition-colors bg-slate-100 rounded-full shadow-md z-10"><Icon name="x" size={22}/></button>
                                
                                <div className="mb-6">
                                    <h3 className="font-black text-slate-800 uppercase text-xs tracking-widest leading-none">
                                        {modalType === 'tray_cell' ? `PENGELOLAAN LUBANG` : (editingItem ? 'Edit Data' : 'Tambah Baru')}
                                    </h3>
                                </div>
                                
                                <form onSubmit={handleSave} className="space-y-4">
                                    {modalType !== 'tray_cell' && (
                                        <div className="flex flex-col items-center gap-3 p-6 bg-slate-50 rounded-3xl border-2 border-dashed border-slate-200 cursor-pointer" onClick={() => fileRef.current.click()}>
                                            <div className="w-20 h-20 bg-white rounded-2xl border-4 border-white shadow-lg overflow-hidden flex items-center justify-center">
                                                {tempImage ? <img src={tempImage} className="w-full h-full object-cover"/> : <Icon name="camera" size={32} className="text-slate-200"/>}
                                            </div>
                                            <div className="text-[10px] font-black text-emerald-700 uppercase tracking-widest">AMBIL FOTO</div>
                                            <input type="file" ref={fileRef} className="hidden" accept="image/*" capture="environment" onChange={handleFileChange}/>
                                        </div>
                                    )}

                                    {modalType === 'plant' && (
                                        <Fragment>
                                            <input name="nama" defaultValue={editingItem?.nama} required className="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none font-bold text-slate-700 focus:bg-white" placeholder="Nama Tanaman"/>
                                            <div className="grid grid-cols-2 gap-3">
                                                <input name="varietas" defaultValue={editingItem?.varietas} className="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none font-bold focus:bg-white" placeholder="Varietas"/>
                                                <select name="status" defaultValue={editingItem?.status || 'Hidup'} className="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none font-bold">
                                                    <option>Hidup</option><option>Mati</option>
                                                </select>
                                            </div>
                                            <input type="date" name="tanggal" defaultValue={editingItem?.tanggal || new Date().toISOString().split('T')[0]} className="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none font-bold"/>
                                        </Fragment>
                                    )}

                                    {modalType === 'log' && (
                                        <Fragment>
                                            <select name="plantId" defaultValue={editingItem?.plantId} className="w-full p-4 bg-emerald-50 text-emerald-800 rounded-2xl border-none outline-none font-black uppercase">
                                                {plants.map(p => <option key={p.id} value={p.id}>{p.id} - {p.nama}</option>)}
                                            </select>
                                            <div className="grid grid-cols-2 gap-3">
                                                <input name="tinggi" type="number" step="0.1" defaultValue={editingItem?.tinggi} placeholder="Tinggi (cm)" required className="p-4 bg-slate-50 rounded-2xl border-none outline-none font-bold"/>
                                                <input name="daun" type="number" defaultValue={editingItem?.daun} placeholder="Daun" required className="p-4 bg-slate-50 rounded-2xl border-none outline-none font-bold"/>
                                            </div>
                                            <select name="fase" defaultValue={editingItem?.fase || 'Semai'} className="w-full p-4 bg-emerald-50 text-emerald-700 rounded-2xl border-none outline-none font-black"><option>Semai</option><option>Vegetatif</option><option>Bunga</option><option>Buah</option><option>Panen</option></select>
                                            <input type="date" name="tanggal" defaultValue={editingItem?.tanggal || new Date().toISOString().split('T')[0]} className="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none font-bold"/>
                                        </Fragment>
                                    )}

                                    {modalType === 'tray_cell' && (
                                        <Fragment>
                                            <div className="space-y-4">
                                                <div>
                                                    <label className="text-[10px] font-black text-slate-400 uppercase ml-1">Nama Benih/Bibit</label>
                                                    <input name="nama" defaultValue={editingItem?.nama} required className="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none font-bold mt-1 shadow-inner focus:bg-white transition-all" placeholder="Contoh: Cabai Rawit"/>
                                                </div>
                                                <div className="grid grid-cols-2 gap-3">
                                                    <div>
                                                        <label className="text-[10px] font-black text-slate-400 uppercase ml-1">Tanggal Semai</label>
                                                        <input type="date" name="tanggal" defaultValue={editingItem?.tanggal || new Date().toISOString().split('T')[0]} className="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none font-bold mt-1 shadow-inner"/>
                                                    </div>
                                                    <div>
                                                        <label className="text-[10px] font-black text-slate-400 uppercase ml-1">Status</label>
                                                        <select name="status" defaultValue={editingItem?.status || 'Tumbuh'} className="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none font-bold mt-1 shadow-inner">
                                                            <option>Tumbuh</option><option>Belum Sprout</option><option>Gagal</option>
                                                        </select>
                                                    </div>
                                                </div>
                                            </div>
                                            {editingItem?.nama && (
                                                <button type="button" onClick={() => handleClearCell(editingItem.cellId)} className="w-full p-4 bg-rose-50 text-rose-500 rounded-2xl font-black text-[10px] uppercase tracking-widest border border-rose-100 active:scale-95 transition-all mt-2">Kosongkan Lubang</button>
                                            )}
                                        </Fragment>
                                    )}

                                    <button type="submit" disabled={isSaving} className={`w-full ${isSaving ? 'bg-emerald-400 animate-pulse' : 'bg-emerald-600'} text-white p-5 rounded-[1.5rem] font-black uppercase text-[11px] shadow-xl mt-4 tracking-widest`}>
                                        {isSaving ? 'MENYIMPAN...' : 'SIMPAN DATA'}
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
