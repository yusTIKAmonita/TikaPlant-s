<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikaPlant's Dashboard</title>
    <!-- Library pendukung via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase Libraries (Compat Version) -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            background-color: #f8fafc;
        }
        .fade-in { animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .modal-up { animation: modalUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes modalUp { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    </style>
</head>
<body class="text-slate-700 text-sm">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, Fragment } = React;

        // --- DATA MASTER: 18 TANAMAN LENGKAP ---
        const INITIAL_PLANTS = [
            { id: 'STE-001', nama: 'Snapdragon Tetra', varietas: 'Floral', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
            { id: 'DPE-001', nama: 'Dwarf Petunia', varietas: 'Miniature', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
            { id: 'ACR-001', nama: 'Aster Crego', varietas: 'Perennial', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
            { id: 'KAN-001', nama: 'Kangkung', varietas: 'Darat', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
            { id: 'THI-001', nama: 'Terong Hijau', varietas: 'Lalap', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
            { id: 'TUN-001', nama: 'Terong Ungu', varietas: 'Panjang', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
            { id: 'CAB-001', nama: 'Cabai', varietas: 'Rawit', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
            { id: 'STR-001', nama: 'Stroberi', varietas: 'Manis', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
            { id: 'BAY-001', nama: 'Bayam', varietas: 'Cabut', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
            { id: 'CIP-001', nama: 'Ciplukan', varietas: 'Liar', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
            { id: 'LBU-001', nama: 'Lidah Buaya', varietas: 'Aloe Vera', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
            { id: 'ANG-001', nama: 'Anggrek', varietas: 'Pot 1', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
            { id: 'ANG-002', nama: 'Anggrek', varietas: 'Pot 2', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
            { id: 'ANG-003', nama: 'Anggrek', varietas: 'Pot 3', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
            { id: 'LME-001', nama: 'Lidah Mertua', varietas: 'Pot 1', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
            { id: 'LME-002', nama: 'Lidah Mertua', varietas: 'Pot 2', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
            { id: 'LME-003', nama: 'Lidah Mertua', varietas: 'Pot 3', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' },
            { id: 'SER-001', nama: 'Sereh', varietas: 'Dapur', media: 'Tanah', tanggal: '2026-03-28', status: 'Hidup', foto: '' }
        ];

        // --- DATA LOG AWAL ---
        const INITIAL_LOGS = [
            { id: 'log-1', plantId: 'STE-001', tanggal: '2026-03-30', tinggi: 0.5, daun: 2, fase: 'Semai', kondisi: 'Sehat', foto: '' },
            { id: 'log-2', plantId: 'KAN-001', tanggal: '2026-03-31', tinggi: 1.2, daun: 4, fase: 'Vegetatif', kondisi: 'Sehat', foto: '' }
        ];

        // --- KONFIGURASI FIREBASE ---
        const MY_CLOUD_CONFIG = {
            apiKey: "AIzaSyBJS2wHHjLonDIhtcqE2IZllTZOVu2w01M", 
            authDomain: "tikaplant-s.firebaseapp.com",
            projectId: "tikaplant-s",
            storageBucket: "tikaplant-s.firebasestorage.app",
            messagingSenderId: "857994265566",
            appId: "1:857994265566:web:bf5c6bf879c1b9a36a134f",
            measurementId: "G-3MEKH8YZRX"
        };

        const MY_APP_ID = "tika-plant-dashboard";
        let db = null; let auth = null; let appId = MY_APP_ID;

        try {
            const activeConfig = (typeof __firebase_config !== 'undefined' && __firebase_config) 
                ? JSON.parse(__firebase_config) : MY_CLOUD_CONFIG;
            if (!firebase.apps.length) firebase.initializeApp(activeConfig);
            db = firebase.firestore(); auth = firebase.auth();
            appId = (typeof __app_id !== 'undefined' ? __app_id : MY_APP_ID);
        } catch (e) { console.warn("Firebase Init Offline"); }

        const Icon = ({ name, size = 18, className = "" }) => {
            const icons = {
                flower: (
                    <Fragment>
                        <circle cx="12" cy="12" r="2.5" fill="#f472b6" />
                        <path d="M12 7.5c1.5-4.5 7.5-4.5 7.5 0s-6 7.5-7.5 7.5-7.5-3-7.5-7.5 6-4.5 7.5 0z" opacity="0.4" fill="#f472b6" />
                        <path d="M16.5 12c4.5 1.5 4.5 7.5 0 7.5s-7.5-6-7.5-7.5 3-7.5 7.5-7.5 4.5 6 0 7.5z" opacity="0.4" fill="#f472b6" />
                        <path d="M12 16.5c-1.5 4.5-7.5 4.5-7.5 0s6-7.5 7.5-7.5 7.5 3 7.5 7.5-6 4.5-7.5 0z" opacity="0.4" fill="#f472b6" />
                        <path d="M7.5 12c-4.5-1.5-4.5-7.5 0-7.5s7.5 6 7.5 7.5-3 7.5-7.5 7.5-4.5-6 0-7.5z" opacity="0.4" fill="#f472b6" />
                    </Fragment>
                ),
                leaf: <path d="M11 20a7 7 0 0 1-7-7c0-2.3 1.3-4.5 3.3-5.3A7 7 0 0 1 18 13a7 7 0 0 1-7 7z M2 21l9-9" stroke="currentColor" strokeWidth="2"/>,
                plus: <path d="M12 5v14M5 12h14" stroke="currentColor" strokeWidth="3"/>,
                cloud: <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z" stroke="currentColor" strokeWidth="2"/>,
                lock: <Fragment><rect x="3" y="11" width="18" height="11" rx="2" ry="2" stroke="currentColor" strokeWidth="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="currentColor" strokeWidth="2"/></Fragment>,
                camera: <Fragment><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" stroke="currentColor" strokeWidth="2"/><circle cx="12" cy="13" r="4" stroke="currentColor" strokeWidth="2"/></Fragment>,
                x: <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" strokeWidth="3"/>,
                trash: <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" stroke="currentColor" strokeWidth="2"/>,
                edit: <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z" stroke="currentColor" strokeWidth="2"/>,
                image: <Fragment><rect x="3" y="3" width="18" height="18" rx="2" ry="2" stroke="currentColor" strokeWidth="2"/><circle cx="8.5" cy="8.5" r="1.5" stroke="currentColor" strokeWidth="2"/><polyline points="21 15 16 10 5 21" stroke="currentColor" strokeWidth="2"/></Fragment>
            };
            return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" className={className}>{icons[name] || null}</svg>;
        };

        const App = () => {
            const [plants, setPlants] = useState(INITIAL_PLANTS);
            const [logs, setLogs] = useState(INITIAL_LOGS);
            const [user, setUser] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [isOnline, setIsOnline] = useState(false);
            const [activeTab, setActiveTab] = useState('master');
            const [showModal, setShowModal] = useState(false);
            const [modalType, setModalType] = useState('plant');
            const [editingItem, setEditingItem] = useState(null);
            const [tempImage, setTempImage] = useState('');
            const fileRef = useRef(null);

            useEffect(() => {
                if (!auth) { setIsLoading(false); return; }
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (e) { setIsOnline(false); }
                };
                initAuth();
                const unsubscribe = auth.onAuthStateChanged(u => {
                    setUser(u);
                    setIsOnline(!!u);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user || !db) {
                    if (!user) {
                         const lp = JSON.parse(localStorage.getItem('plants'));
                         const ll = JSON.parse(localStorage.getItem('logs'));
                         if (lp) setPlants(lp); if (ll) setLogs(ll);
                    }
                    setIsLoading(false);
                    return;
                }

                setIsLoading(true);
                const baseRef = db.collection('artifacts').doc(appId).collection('public').doc('data');
                
                const unsubP = baseRef.collection('plants').onSnapshot(snap => {
                    if (!snap.empty) setPlants(snap.docs.map(d => ({id: d.id, ...d.data()})));
                    setIsLoading(false);
                }, () => setIsOnline(false));

                const unsubL = baseRef.collection('logs').onSnapshot(snap => {
                    const data = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    data.sort((a, b) => new Date(b.tanggal) - new Date(a.tanggal));
                    if(data.length > 0) setLogs(data);
                }, () => setIsOnline(false));

                return () => { unsubP(); unsubL(); };
            }, [user]);

            const calculateAge = (date) => {
                const start = new Date(date);
                const now = new Date();
                start.setHours(0,0,0,0);
                return Math.max(0, Math.floor((now - start) / (1000 * 60 * 60 * 24)));
            };

            // LOGIKA PENGKODEAN SESUAI KESEPAKATAN
            const generateId = (name) => {
                const words = name.trim().split(/\s+/).filter(w => w.length > 0);
                let prefix = "";
                
                if (words.length >= 3) {
                    // Kasus 3 suku kata atau lebih: Ambil huruf pertama tiap kata (3 kata pertama)
                    prefix = words[0][0] + words[1][0] + words[2][0];
                } else if (words.length === 2) {
                    // Kasus 2 suku kata: 1 huruf kata pertama + 2 huruf kata kedua
                    prefix = words[0][0] + words[1].substring(0, 2);
                } else if (words.length === 1) {
                    // Kasus 1 suku kata: 3 huruf awal
                    prefix = words[0].substring(0, 3);
                } else {
                    prefix = "PLT";
                }
                
                prefix = prefix.toUpperCase().padEnd(3, 'X');
                const count = plants.filter(x => x.id.startsWith(prefix)).length;
                return `${prefix}-${(count + 1).toString().padStart(3, '0')}`;
            };

            const handleSave = async (e) => {
                e.preventDefault();
                const f = new FormData(e.target);
                const data = Object.fromEntries(f.entries());
                data.foto = tempImage || editingItem?.foto || '';

                if (modalType === 'plant') {
                    if (isOnline && db && user) {
                        const ref = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('plants');
                        if (editingItem) await ref.doc(editingItem.id).set(data, {merge: true});
                        else await ref.doc(generateId(data.nama)).set(data);
                    } else {
                        const newP = [...plants];
                        if (editingItem) newP[newP.findIndex(x => x.id === editingItem.id)] = {...editingItem, ...data};
                        else newP.push({id: generateId(data.nama), ...data});
                        setPlants(newP); localStorage.setItem('plants', JSON.stringify(newP));
                    }
                } else {
                    if (isOnline && db && user) {
                        const ref = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('logs');
                        if (editingItem) await ref.doc(editingItem.id).set(data, {merge: true});
                        else await ref.add(data);
                    } else {
                        const newL = [...logs];
                        if (editingItem) newL[newL.findIndex(x => x.id === editingItem.id)] = {...editingItem, ...data};
                        else newL.unshift({id: Date.now(), ...data});
                        setLogs(newL); localStorage.setItem('logs', JSON.stringify(newL));
                    }
                }
                setShowModal(false); setEditingItem(null); setTempImage('');
            };

            const handleDelete = async (id, type) => {
                if (isOnline && db && user) {
                    const ref = db.collection('artifacts').doc(appId).collection('public').doc('data').collection(type === 'plant' ? 'plants' : 'logs');
                    await ref.doc(id).delete();
                } else {
                    if (type === 'plant') {
                        const newP = plants.filter(x => x.id !== id);
                        setPlants(newP); localStorage.setItem('plants', JSON.stringify(newP));
                    } else {
                        const newL = logs.filter(x => x.id !== id);
                        setLogs(newL); localStorage.setItem('logs', JSON.stringify(newL));
                    }
                }
            };

            if (isLoading && !user) return <div className="flex flex-col items-center justify-center min-h-screen text-slate-400 font-black uppercase text-xs animate-pulse">Menghubungkan...</div>;

            return (
                <div className="max-w-md mx-auto min-h-screen bg-slate-50 flex flex-col relative pb-24 shadow-2xl overflow-x-hidden">
                    <input type="file" ref={fileRef} className="hidden" accept="image/*" capture="environment" onChange={e => {
                        const r = new FileReader(); r.onload = () => setTempImage(r.result); r.readAsDataURL(e.target.files[0]);
                    }}/>

                    <header className="bg-white p-6 rounded-b-[2.5rem] shadow-sm sticky top-0 z-20 border-b border-slate-100">
                        <div className="flex justify-between items-center mb-6">
                            <div>
                                <h1 className="text-2xl font-bold text-emerald-800 flex items-center gap-2 tracking-tight">
                                    <Icon name="flower" size={26} /> TikaPlant's
                                </h1>
                                <div className="flex items-center gap-2 mt-1">
                                    <div className={`p-1 rounded-full ${isOnline ? 'bg-emerald-50 text-emerald-600 border border-emerald-100' : 'bg-slate-50 text-slate-300 border border-slate-100'}`}>
                                        <Icon name={isOnline ? 'cloud' : 'lock'} size={12}/>
                                    </div>
                                    <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{isOnline ? 'Tersinkron' : 'Offline'}</span>
                                </div>
                            </div>
                            <div className="flex gap-2 bg-slate-50 p-2 px-3 rounded-2xl border border-slate-100 text-center">
                                <div className="pr-2 border-r border-slate-200">
                                    <div className="text-[9px] font-bold text-slate-400 uppercase leading-none mb-1">Hidup</div>
                                    <div className="text-lg font-black text-emerald-600 leading-none">{plants.filter(x => x.status === 'Hidup').length}</div>
                                </div>
                                <div className="pl-2">
                                    <div className="text-[9px] font-bold text-slate-400 uppercase leading-none mb-1">Total</div>
                                    <div className="text-lg font-black text-slate-500 leading-none">{plants.length}</div>
                                </div>
                            </div>
                        </div>
                        <nav className="flex gap-8">
                            {['master', 'logs'].map(t => (
                                <button key={t} onClick={() => setActiveTab(t)} className={`pb-2 text-xs font-bold uppercase tracking-widest relative transition-all ${activeTab === t ? 'text-emerald-700' : 'text-slate-300'}`}>
                                    {t === 'master' ? 'Tanaman' : 'Log Harian'}
                                    {activeTab === t && <div className="absolute bottom-0 left-0 w-full h-1 bg-emerald-600 rounded-full"/>}
                                </button>
                            ))}
                        </nav>
                    </header>

                    <main className="p-4 flex-1 space-y-4 fade-in">
                        {activeTab === 'master' ? plants.map(p => (
                            <div key={p.id} className={`bg-white p-4 rounded-[2rem] border shadow-sm flex items-center gap-4 ${p.status === 'Mati' ? 'opacity-50 grayscale bg-slate-50' : 'border-slate-100'}`}>
                                <div className="w-14 h-14 rounded-2xl bg-slate-100 overflow-hidden border border-slate-200 flex-shrink-0">
                                    {p.foto ? <img src={p.foto} className="w-full h-full object-cover"/> : <Icon name="flower" size={24} className="m-auto mt-4"/>}
                                </div>
                                <div className="flex-1 min-w-0">
                                    <div className="text-[10px] font-black text-emerald-800 uppercase tracking-tight">{p.id}</div>
                                    <div className="text-[15px] font-extrabold text-slate-800 truncate my-0.5">{p.nama}</div>
                                    <div className="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">{p.varietas} | {calculateAge(p.tanggal)} Hari</div>
                                </div>
                                <div className="flex gap-1">
                                    <button onClick={() => {setEditingItem(p); setTempImage(p.foto); setModalType('plant'); setShowModal(true);}} className="p-2.5 bg-blue-50 text-blue-600 rounded-xl border border-blue-100 transition-all active:scale-90"><Icon name="edit" size={16}/></button>
                                    <button onClick={() => handleDelete(p.id, 'plant')} className="p-2.5 bg-rose-50 text-rose-600 rounded-xl border border-rose-100 transition-all active:scale-90"><Icon name="trash" size={16}/></button>
                                </div>
                            </div>
                        )) : logs.map(l => (
                            <div key={l.id} className="bg-white p-4 rounded-[2rem] border border-slate-100 shadow-sm space-y-3">
                                <div className="flex justify-between items-center border-b border-slate-50 pb-2">
                                    <div className="flex items-center gap-2">
                                        <div className="w-10 h-10 rounded-xl bg-slate-100 overflow-hidden border">
                                            {l.foto ? <img src={l.foto} className="w-full h-full object-cover"/> : <Icon name="flower" size={22} className="m-auto mt-2" />}
                                        </div>
                                        <div>
                                            <div className="text-[10px] font-black text-emerald-800 uppercase leading-none">{l.plantId}</div>
                                            <div className="text-[9px] font-bold text-slate-400 mt-1">{l.tanggal}</div>
                                        </div>
                                    </div>
                                    <div className="flex gap-1">
                                        <button onClick={() => {setEditingItem(l); setTempImage(l.foto); setModalType('log'); setShowModal(true);}} className="p-1.5 bg-blue-50 text-blue-500 rounded-lg transition-all active:scale-90"><Icon name="edit" size={12}/></button>
                                        <button onClick={() => handleDelete(l.id, 'log')} className="p-1.5 bg-rose-50 text-rose-500 rounded-lg transition-all active:scale-90"><Icon name="trash" size={12}/></button>
                                    </div>
                                </div>
                                <div className="grid grid-cols-3 gap-2 text-center text-xs">
                                    <div className="bg-slate-50 p-2 rounded-2xl"><div className="text-[8px] text-slate-400 uppercase font-black mb-1">Tinggi</div><div className="font-bold">{l.tinggi} cm</div></div>
                                    <div className="bg-slate-50 p-2 rounded-2xl"><div className="text-[8px] text-slate-400 uppercase font-black mb-1">Daun</div><div className="font-bold">{l.daun} Helai</div></div>
                                    <div className="bg-emerald-50 p-2 rounded-2xl text-emerald-700"><div className="text-[8px] opacity-60 uppercase font-black mb-1">Fase</div><div className="font-bold">{l.fase}</div></div>
                                </div>
                            </div>
                        ))}
                    </main>

                    <button onClick={() => {setEditingItem(null); setModalType(activeTab === 'master' ? 'plant' : 'log'); setShowModal(true);}} className="fixed bottom-8 right-8 w-16 h-16 bg-emerald-600 text-white rounded-full shadow-2xl flex items-center justify-center active:scale-90 transition-all z-30 border-4 border-white">
                        <Icon name="plus" size={28}/>
                    </button>

                    {showModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-6">
                            <div className="bg-white w-full rounded-[2.5rem] p-8 shadow-2xl max-h-[90vh] overflow-y-auto modal-up">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="font-black text-slate-800 uppercase text-xs tracking-widest">{editingItem ? 'Edit' : 'Tambah'} {modalType === 'plant' ? 'Tanaman' : 'Log'}</h3>
                                    <button onClick={()=>setShowModal(false)} className="text-slate-300"><Icon name="x" size={20}/></button>
                                </div>
                                <form onSubmit={handleSave} className="space-y-4">
                                    <div className="flex flex-col items-center gap-3 p-6 bg-slate-50 rounded-3xl border-2 border-dashed border-slate-200 cursor-pointer" onClick={() => fileRef.current.click()}>
                                        <div className="w-20 h-20 bg-white rounded-2xl border-4 border-white shadow-lg overflow-hidden flex items-center justify-center">
                                            {tempImage ? <img src={tempImage} className="w-full h-full object-cover"/> : <Icon name="camera" size={32} className="text-slate-200"/>}
                                        </div>
                                        <div className="text-[10px] font-black text-emerald-700 uppercase tracking-widest">Ganti Foto</div>
                                        <input type="file" ref={fileRef} className="hidden" accept="image/*" capture="environment" onChange={(e)=>{const r=new FileReader(); r.onload=()=>setTempImage(r.result); r.readAsDataURL(e.target.files[0]);}}/>
                                    </div>
                                    {modalType === 'plant' ? (
                                        <Fragment>
                                            <input name="nama" defaultValue={editingItem?.nama} required className="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none font-bold text-slate-700" placeholder="Nama Tanaman"/>
                                            <div className="grid grid-cols-2 gap-3">
                                                <input name="varietas" defaultValue={editingItem?.varietas} className="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none font-bold" placeholder="Varietas"/>
                                                <select name="status" defaultValue={editingItem?.status || 'Hidup'} className="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none font-bold">
                                                    <option>Hidup</option><option>Mati</option>
                                                </select>
                                            </div>
                                            <input type="date" name="tanggal" defaultValue={editingItem?.tanggal || new Date().toISOString().split('T')[0]} className="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none font-bold"/>
                                        </Fragment>
                                    ) : (
                                        <Fragment>
                                            <select name="plantId" defaultValue={editingItem?.plantId} className="w-full p-4 bg-emerald-50 text-emerald-800 rounded-2xl border-none outline-none font-black uppercase">
                                                {plants.map(p => <option key={p.id} value={p.id}>{p.id} - {p.nama}</option>)}
                                            </select>
                                            <div className="grid grid-cols-2 gap-3">
                                                <input name="tinggi" type="number" step="0.1" defaultValue={editingItem?.tinggi} placeholder="Tinggi (cm)" required className="p-4 bg-slate-50 rounded-2xl border-none outline-none font-bold"/>
                                                <input name="daun" type="number" defaultValue={editingItem?.daun} placeholder="Daun" required className="p-4 bg-slate-50 rounded-2xl border-none outline-none font-bold"/>
                                            </div>
                                            <select name="fase" defaultValue={editingItem?.fase || 'Semai'} className="w-full p-4 bg-emerald-50 text-emerald-700 rounded-2xl border-none outline-none font-black"><option>Semai</option><option>Vegetatif</option><option>Bunga</option><option>Buah</option><option>Panen</option></select>
                                            <input type="date" name="tanggal" defaultValue={editingItem?.tanggal || new Date().toISOString().split('T')[0]} className="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none font-bold"/>
                                        </Fragment>
                                    )}
                                    <button type="submit" className="w-full bg-emerald-600 text-white p-5 rounded-[1.5rem] font-black uppercase text-[11px] shadow-xl active:scale-95 transition-all mt-4">Simpan Data</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
